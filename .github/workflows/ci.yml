name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required agent files
        run: |
          test -f AGENTS.md
          test -f plan.md
          test -f memory-bank/activeContext.md
          test -f workflows/verify-before-commit.md
