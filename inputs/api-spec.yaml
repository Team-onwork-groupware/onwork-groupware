openapi: 3.0.0
info:
  title: OnWork API
  version: 1.1.0-0529
  description: Canonical contract from OnWork_API_0529.pdf and OnWork_변경사항요약_0529.pdf.
servers:
  - url: http://localhost:8080/api/v1
    description: local backend

x-policy:
  json_case: snake_case
  auth: Bearer JWT access token, 30 minutes
  rbac: CEO > VP > HR_MANAGER > MANAGER > EMPLOYEE
  compatibility_aliases:
    - Existing non-PDF endpoints may remain temporarily only if frontend no longer depends on them.
    - Canonical endpoints below are the implementation and test target.

paths:
  /auth/login:
    post:
      summary: 로그인
  /auth/refresh:
    post:
      summary: 토큰 갱신
  /auth/logout:
    post:
      summary: 로그아웃 및 access token blacklist
  /auth/me:
    get:
      summary: 내 정보

  /hr/employees:
    get:
      summary: 직원 목록 조회
      parameters:
        - { name: department_id, in: query, schema: { type: integer, format: int64 } }
        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, INACTIVE, RESIGNED] } }
        - { name: keyword, in: query, schema: { type: string } }
  /hr/employees/{id}:
    get:
      summary: 직원 상세 조회
  /hr/change-requests:
    post:
      summary: 인사 변경 요청 등록
      x-change-types: [CREATE, UPDATE, RESIGN]
    get:
      summary: 인사 변경 요청 목록 조회
  /hr/change-requests/{id}/process:
    patch:
      summary: 인사 변경 요청 승인/반려 처리
      x-actions: [APPROVE, REJECT]
  /hr/change-requests/batch-process:
    post:
      summary: 인사 변경 요청 일괄 승인
      x-rules:
        - APPROVE only
        - max 50 ids
        - partial success
        - batch_id UUID audit grouping

  /attendance/clock-in:
    post:
      summary: 출근 기록
  /attendance/clock-out:
    patch:
      summary: 퇴근 기록
  /attendance/me:
    get:
      summary: 내 근태 현황 조회
  /attendance/anomalies:
    get:
      summary: 팀 근태 이상자 목록 조회
      parameters:
        - { name: year_month, in: query, schema: { type: string, pattern: "^\\d{4}-\\d{2}$" } }
        - { name: department_id, in: query, schema: { type: integer, format: int64 } }
        - { name: anomaly_type, in: query, schema: { type: string } }
        - { name: confirmed, in: query, schema: { type: boolean } }
  /attendance/anomalies/{anomaly_id}/confirm:
    patch:
      summary: 근태 이상 확정 처리
      x-body:
        anomaly_type: 원본 유지 또는 재지정
        overtime_approved: UNAPPROVED_OVERTIME only
  /attendance/overtime-requests:
    post:
      summary: 시간외 근로 신청
  /attendance/overtime-requests/{id}/process:
    patch:
      summary: 시간외 근로 승인/반려
      x-actions: [APPROVE, REJECT]
  /attendance/monthly-summaries:
    post:
      summary: 월 마감 처리

  /leave-balances/me:
    get:
      summary: 내 휴가 잔여일수 조회
  /leave-requests:
    post:
      summary: 휴가 신청
  /leave-requests/me:
    get:
      summary: 내 휴가 신청 목록 조회
  /leave-requests/{id}/cancel:
    patch:
      summary: PENDING/ON_HOLD 휴가 신청 취소
  /leave-requests/{id}/cancel-approved:
    patch:
      summary: 승인자가 APPROVED 휴가 취소
  /leave-requests/{id}/process:
    patch:
      summary: 휴가 승인/보류 처리
      x-actions: [APPROVE, ON_HOLD]
  /leave-grants:
    post:
      summary: 보상휴가 수동 부여
      x-rules:
        - CEO/VP only
        - multiple users
        - partial success
  /leave-requests/summary:
    get:
      summary: 전사 휴가 사용 현황 조회

  /approvals:
    get:
      summary: 결재함 통합 조회
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [LEAVE, ATTENDANCE, HR] } }
        - { name: status, in: query, schema: { type: string, enum: [PENDING, COMPLETED] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
  /approvals/{id}/process:
    patch:
      summary: 결재 처리
      x-actions: [APPROVE, ON_HOLD, REJECT]

  /notifications:
    get:
      summary: 알림 목록 조회
  /notifications/{id}/read:
    patch:
      summary: 알림 읽음 처리
  /notifications/read-all:
    patch:
      summary: 알림 전체 읽음 처리

  /onboarding/tutorials/me:
    get:
      summary: 내 튜토리얼 진행 상태 조회
  /onboarding/tutorials/me/{tutorialCode}/step:
    patch:
      summary: 튜토리얼 단계 진행
  /onboarding/tutorials/me/{tutorialCode}/visibility:
    patch:
      summary: 튜토리얼 표시 설정 변경
  /onboarding/tutorials/me/{tutorialCode}/restart:
    post:
      summary: 튜토리얼 재시작

components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
