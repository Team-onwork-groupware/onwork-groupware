spring:
  application:
    name: onwork
  datasource:
    url: jdbc:postgresql://localhost:5432/onwork
    username: onwork
    password: onwork
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none          # 스키마는 db/schema.sql이 소유 (Flyway는 Phase 6에서 검토)
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

# JWT 설정 (ADR-SYS-002) — secret은 운영에서 환경변수로 override
onwork:
  jwt:
    secret: "dev-only-onwork-jwt-secret-please-override-with-256bit-key-0123456789"
    access-token-validity-minutes: 30
    refresh-token-validity-days: 7
